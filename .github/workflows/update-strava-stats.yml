name: Update Strava Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: update-strava-stats
  cancel-in-progress: false

jobs:
  update-strava-stats:
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check Strava secret availability
        run: |
          test -n "$STRAVA_CLIENT_ID" && echo "STRAVA_CLIENT_ID: present" || echo "STRAVA_CLIENT_ID: missing"
          test -n "$STRAVA_CLIENT_SECRET" && echo "STRAVA_CLIENT_SECRET: present" || echo "STRAVA_CLIENT_SECRET: missing"
          test -n "$STRAVA_REFRESH_TOKEN" && echo "STRAVA_REFRESH_TOKEN: present" || echo "STRAVA_REFRESH_TOKEN: missing"
          test -n "$STRAVA_ATHLETE_ID" && echo "STRAVA_ATHLETE_ID: present" || echo "STRAVA_ATHLETE_ID: missing"
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          STRAVA_ATHLETE_ID: ${{ secrets.STRAVA_ATHLETE_ID }}

      - name: Fetch Strava stats
        run: node scripts/fetch-strava-stats.js
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          STRAVA_ATHLETE_ID: ${{ secrets.STRAVA_ATHLETE_ID }}

      - name: Commit updated stats
        run: |
          if git diff --quiet assets/data/strava-stats.json; then
            echo "No Strava stats changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/strava-stats.json
          git commit -m "Update Strava stats"
          git pull --rebase origin main
          git push
